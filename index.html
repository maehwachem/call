<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>출결 연락 도구</title>

  <link rel="manifest" href="/call/manifest.webmanifest">
  <meta name="theme-color" content="#ffffff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
</head>

<body>
  <button id="openSheet" style="font-size:18px;padding:12px 16px;">
    📄 출결 시트 열기
  </button>

  <p id="msg">이동 중…</p>
  <p><a id="fallback" href="#">안 되면 여기를 탭</a></p>

  <script>
    // (1) 시트 열기 버튼
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/1FJN1gAqM4pHN8l8uUdhQfAgVg4lPONioNF8CFaV2Fak/edit?usp=sharing";
    document.getElementById("openSheet").addEventListener("click", () => {
      window.open(SHEET_URL, "_blank");
    });

    // (2) call/sms 리다이렉트
    const params = new URLSearchParams(location.search);
    const isHome = params.get("home") === "1";

    const rawN = params.get("n") || "";
    const n = rawN.replace(/[^0-9+]/g, "");

    const t = (params.get("t") || "").toLowerCase(); // call | sms
    const body = params.get("body") || "";

    const msgEl = document.getElementById("msg");
    const linkEl = document.getElementById("fallback");

    // n이 없거나(home=1)면: 홈 화면 고정
    if (!n || isHome) {
      msgEl.textContent = "홈 화면입니다. 위의 📄 버튼으로 출결 시트를 열 수 있어요.";
    } else {
      let uri = "";

      if (t === "sms") {
        const encBody = encodeURIComponent(body);
        uri = body ? `sms:${n}?body=${encBody}` : `sms:${n}`;
        msgEl.textContent = body ? `문자 보내기: ${n}` : `문자 작성: ${n}`;
      } else {
        uri = `tel:${n}`;
        msgEl.textContent = `전화 걸기: ${n}`;
      }

      linkEl.href = uri;
      location.href = uri; // 자동 실행
    }
  </script>

  <script>
    // (3) 서비스워커 등록
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/call/sw.js");
    }
  </script>
</body>
</html>
